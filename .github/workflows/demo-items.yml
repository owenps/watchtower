name: Create demo Watchtower items

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Create demo issues
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create --repo "$REPO" --title "[demo] Add repo aliases in settings" --body "Temporary demo issue for Watchtower screenshots.\n\nIdea: allow each watched repo to have a short display name so dense terminal layouts stay readable." --assignee owenps
          gh issue create --repo "$REPO" --title "[demo] Ignore low-signal labels" --body "Temporary demo issue for Watchtower screenshots.\n\nIdea: per-repo ignored labels like wip, blocked, or no-action-needed so noisy work stays out of Incoming." --assignee owenps
          gh issue create --repo "$REPO" --title "[demo] Compact density option" --body "Temporary demo issue for Watchtower screenshots.\n\nIdea: add compact/comfy display density for observers who watch many repos." --assignee owenps
